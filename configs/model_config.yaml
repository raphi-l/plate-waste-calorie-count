configs:
  linear_baseline:
    model: linear_baseline
    lr: 0.001
    optimizer: adam

  efficientnet_b0:
    model: efficientnet
    variant: 0
    weights: EfficientNet_B0_Weights.DEFAULT
    lr: 0.000005
    optimizer: adam
    layers_to_unfreeze: 0
    unfreeze_epoch: 5      # unfreeze after 5 epochs for fine-tuning
    dropout: 0.4
  
  efficientnet_b1:
    model: efficientnet
    variant: 1
    weights: EfficientNet_B1_Weights.DEFAULT
    lr: 0.000005
    optimizer: adam
    layers_to_unfreeze: 0
    unfreeze_epoch: 5      # unfreeze after 5 epochs for fine-tuning
    dropout: 0.4

  efficientnet_b3:
    model: efficientnet
    variant: 3
    weights: EfficientNet_B1_Weights.DEFAULT
    lr: 0.0001
    optimizer: adam
    layers_to_unfreeze: 0
    unfreeze_epoch: 5      # unfreeze after 5 epochs for fine-tuning
    dropout: 0.4
  

  transforms:

training:
  batch_size: 32
  epochs: 100
  seed: 42
  loss_weights: [1.0, 3.0] # up-weight protein
